<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel | SJTweaks Staff</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #0d0d0d;
            --surface: #161616;
            --surface-2: #1f1f1f;
            --border: #2a2a2a;
            --text: #fafafa;
            --text-2: #a0a0a0;
            --accent: #10b981;
            --accent-2: #059669;
            --red: #f43f5e;
            --orange: #f97316;
            --blue: #3b82f6;
            --purple: #8b5cf6;
            --cyan: #06b6d4;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            line-height: 1.5;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
            opacity: 0.03;
            pointer-events: none;
            z-index: 0;
        }

        /* Login overlay */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .login-overlay.hidden { display: none; }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 48px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-card .logo {
            width: 64px;
            height: 64px;
            margin-bottom: 24px;
            filter: brightness(1.2);
        }

        .login-card h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .login-card .subtitle {
            color: var(--text-2);
            font-size: 0.9rem;
            margin-bottom: 32px;
        }

        .login-card input {
            width: 100%;
            padding: 14px 16px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            margin-bottom: 16px;
        }

        .login-card input:focus {
            outline: none;
            border-color: var(--accent);
        }

        .login-card .btn {
            width: 100%;
            padding: 14px;
            background: var(--accent);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }

        .login-card .error {
            color: var(--red);
            font-size: 0.85rem;
            margin-top: 16px;
            display: none;
        }

        .login-card .error.show { display: block; }

        /* Main app */
        .app {
            position: relative;
            z-index: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 24px;
            display: none;
        }

        .app.show { display: block; }

        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 40px;
            padding-bottom: 24px;
            border-bottom: 1px solid var(--border);
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .logo {
            width: 44px;
            height: 44px;
            filter: brightness(1.2);
        }

        header h1 {
            font-size: 1.4rem;
            font-weight: 600;
            letter-spacing: -0.02em;
        }

        header h1 span {
            color: var(--accent);
        }

        .logout-btn {
            padding: 10px 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text-2);
            font-family: 'Outfit', sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .logout-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        /* Staff cards */
        .staff-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 32px;
        }

        .staff-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .staff-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--staff-color);
        }

        .staff-card .name {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 12px;
            color: var(--staff-color);
        }

        .staff-card .earnings {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .staff-card .count {
            font-size: 0.85rem;
            color: var(--text-2);
        }

        .staff-card .reset-btn {
            position: absolute;
            top: 16px;
            right: 16px;
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            font-size: 0.75rem;
            cursor: pointer;
            opacity: 0;
            transition: all 0.2s;
        }

        .staff-card:hover .reset-btn { opacity: 1; }
        .staff-card .reset-btn:hover { border-color: var(--red); color: var(--red); }

        /* Charts */
        .charts-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .chart-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .chart-card h3 {
            font-size: 0.85rem;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 20px;
        }

        .chart-wrap {
            display: flex;
            justify-content: center;
        }

        .chart-wrap canvas {
            max-width: 220px !important;
            max-height: 220px !important;
        }

        /* Vouches table */
        .vouches-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
        }

        .vouches-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .vouches-header h3 {
            font-size: 1rem;
            font-weight: 600;
        }

        .reset-all-btn {
            padding: 8px 16px;
            background: var(--red);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            opacity: 0.8;
            transition: opacity 0.2s;
        }

        .reset-all-btn:hover { opacity: 1; }

        .vouches-table {
            width: 100%;
            border-collapse: collapse;
        }

        .vouches-table th {
            text-align: left;
            padding: 12px 8px;
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        .vouches-table td {
            padding: 14px 8px;
            font-size: 0.9rem;
            border-bottom: 1px solid var(--border);
        }

        .vouches-table tr:last-child td { border-bottom: none; }

        .vouches-table .staff-tag {
            display: inline-block;
            padding: 4px 10px;
            background: var(--surface-2);
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .vouches-table .amount {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--accent);
        }

        .vouches-table .amount.rejected {
            color: var(--red);
            text-decoration: line-through;
        }

        .vouches-table .status {
            font-size: 0.8rem;
            padding: 4px 10px;
            border-radius: 4px;
        }

        .vouches-table .status.approved { background: rgba(16, 185, 129, 0.15); color: var(--accent); }
        .vouches-table .status.rejected { background: rgba(244, 63, 94, 0.15); color: var(--red); }

        .vouches-table .delete-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-2);
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .vouches-table .delete-btn:hover {
            border-color: var(--red);
            color: var(--red);
        }

        .table-scroll {
            max-height: 500px;
            overflow-y: auto;
        }

        /* Alerts */
        .alerts-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 320px;
            max-height: 400px;
            overflow-y: auto;
            z-index: 1000;
        }

        .alert-box {
            background: var(--surface);
            border: 1px solid var(--border);
            border-left: 3px solid var(--orange);
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 8px;
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .alert-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 6px;
        }

        .alert-title {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--orange);
            text-transform: uppercase;
        }

        .alert-time {
            font-size: 0.7rem;
            color: var(--text-2);
        }

        .alert-message {
            font-size: 0.85rem;
            color: var(--text);
        }

        @media (max-width: 1024px) {
            .staff-grid { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 768px) {
            .staff-grid { grid-template-columns: 1fr; }
            .charts-row { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <!-- Login overlay (for non-SJay users or direct access) -->
    <div class="login-overlay" id="loginOverlay">
        <div class="login-card">
            <img src="https://i.imgur.com/MBCguvv.png" alt="SJTweaks" class="logo">
            <h2>Admin Access</h2>
            <p class="subtitle">Enter admin password to continue</p>
            <input type="password" id="adminPassword" placeholder="Password">
            <button class="btn" onclick="adminLogin()">Login</button>
            <p class="error" id="loginError">Invalid password</p>
        </div>
    </div>

    <div class="app" id="app">
        <header>
            <div class="header-left">
                <img src="https://i.imgur.com/MBCguvv.png" alt="SJTweaks" class="logo">
                <h1>Admin <span>Panel</span></h1>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </header>

        <div class="staff-grid" id="staffGrid"></div>

        <div class="charts-row">
            <div class="chart-card">
                <h3>Earnings Distribution</h3>
                <div class="chart-wrap">
                    <canvas id="earningsChart"></canvas>
                </div>
            </div>
            <div class="chart-card">
                <h3>Products Breakdown</h3>
                <div class="chart-wrap">
                    <canvas id="productsChart"></canvas>
                </div>
            </div>
        </div>

        <div class="vouches-card">
            <div class="vouches-header">
                <h3>Recent Vouches</h3>
                <button class="reset-all-btn" onclick="resetAll()">Reset All Data</button>
            </div>
            <div class="table-scroll">
                <table class="vouches-table">
                    <thead>
                        <tr>
                            <th>Staff</th>
                            <th>Product</th>
                            <th>Source</th>
                            <th>Amount</th>
                            <th>Status</th>
                            <th></th>
                        </tr>
                    </thead>
                    <tbody id="vouchesBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="alerts-container" id="alertsContainer"></div>

    <script>
        const API = '';
        const ADMIN_PASSWORD = 'sofmun-Gitpox-syzto1';
        let authenticated = false;
        let earningsChart = null;
        let productsChart = null;

        const staffColors = {
            sjay: '#06b6d4',
            nouzen: '#f43f5e',
            daedae: '#10b981',
            kyzo: '#8b5cf6'
        };

        const productColors = {
            'Controller Macro': '#8b5cf6',
            'Zero Delay': '#3b82f6',
            'Zero Delay Plus': '#06b6d4',
            'FPS Boost': '#10b981',
            'Ping Optimizer': '#f97316',
            'Premium Utility': '#eab308',
            'Aim Bundle': '#ec4899',
            'Shotgun Pack': '#f43f5e',
            'Keyboard Macro': '#6366f1',
            'Unknown': '#6b7280'
        };

        const productNameMap = {
            'controller-macro': 'Controller Macro',
            'zero-delay': 'Zero Delay',
            'zero-delay-plus': 'Zero Delay Plus',
            'fps-boost': 'FPS Boost',
            'ping-optimizer': 'Ping Optimizer',
            'premium-utility': 'Premium Utility',
            'aim-bundle': 'Aim Bundle',
            'shotgun-pack': 'Shotgun Pack',
            'keyboard-macro': 'Keyboard Macro',
            'unknown': 'Unknown'
        };

        // Check if logged in as SJay (admin)
        const isAdmin = sessionStorage.getItem('isAdmin') === 'true';
        if (isAdmin) {
            authenticated = true;
            document.getElementById('loginOverlay').classList.add('hidden');
            document.getElementById('app').classList.add('show');
            loadData();
        }

        function adminLogin() {
            const password = document.getElementById('adminPassword').value;
            const errorEl = document.getElementById('loginError');
            
            if (password === ADMIN_PASSWORD) {
                authenticated = true;
                sessionStorage.setItem('isAdmin', 'true');
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('app').classList.add('show');
                loadData();
            } else {
                errorEl.classList.add('show');
            }
        }

        document.getElementById('adminPassword').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') adminLogin();
        });

        async function loadData() {
            if (!authenticated) return;
            
            try {
                const res = await fetch(`${API}/api/vouches/admin`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASSWORD })
                });
                const data = await res.json();

                if (data.success) {
                    renderStaffCards(data.staff);
                    renderVouches(data.recentVouches);
                    renderCharts(data.staff, data.recentVouches);
                    renderAlerts(data.systemAlerts);
                }
            } catch (e) {
                console.error('Error loading data:', e);
            }
        }

        function renderStaffCards(staff) {
            const grid = document.getElementById('staffGrid');
            grid.innerHTML = staff.map(s => `
                <div class="staff-card" style="--staff-color: ${staffColors[s.id]}">
                    <button class="reset-btn" onclick="resetStaff('${s.id}')">Reset</button>
                    <div class="name">${s.name}</div>
                    <div class="earnings">$${s.totalEarnings.toFixed(2)}</div>
                    <div class="count">${s.vouchCount} vouches</div>
                </div>
            `).join('');
        }

        function renderVouches(vouches) {
            const tbody = document.getElementById('vouchesBody');
            
            // Sort by newest first
            vouches.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

            tbody.innerHTML = vouches.slice(0, 50).map(v => {
                const staffNames = (v.staffInvolved || [v.submittedBy]).map(id => 
                    `<span class="staff-tag" style="color: ${staffColors[id] || '#fff'}">${id}</span>`
                ).join(' ');
                const productName = productNameMap[v.product] || v.product;
                const source = v.source === 'discord' ? `Discord (${v.discordUsername || '?'})` : 'Website';
                const isRejected = v.rejected;
                
                return `
                    <tr>
                        <td>${staffNames}</td>
                        <td>${productName}</td>
                        <td>${source}</td>
                        <td class="amount ${isRejected ? 'rejected' : ''}">$${v.earningsPerPerson.toFixed(2)}</td>
                        <td><span class="status ${isRejected ? 'rejected' : 'approved'}">${isRejected ? 'Rejected' : 'Approved'}</span></td>
                        <td><button class="delete-btn" onclick="deleteVouch('${v.id}')">Delete</button></td>
                    </tr>
                `;
            }).join('');
        }

        function renderCharts(staff, vouches) {
            // Earnings by staff
            if (earningsChart) earningsChart.destroy();
            earningsChart = new Chart(document.getElementById('earningsChart'), {
                type: 'doughnut',
                data: {
                    labels: staff.map(s => s.name),
                    datasets: [{
                        data: staff.map(s => s.totalEarnings),
                        backgroundColor: staff.map(s => staffColors[s.id]),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '60%',
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { color: '#a0a0a0', font: { family: 'Outfit', size: 11 }, padding: 10 }
                        }
                    }
                }
            });

            // Products breakdown
            const productCounts = {};
            vouches.filter(v => !v.rejected).forEach(v => {
                const pName = productNameMap[v.product] || 'Unknown';
                productCounts[pName] = (productCounts[pName] || 0) + 1;
            });

            if (productsChart) productsChart.destroy();
            productsChart = new Chart(document.getElementById('productsChart'), {
                type: 'doughnut',
                data: {
                    labels: Object.keys(productCounts),
                    datasets: [{
                        data: Object.values(productCounts),
                        backgroundColor: Object.keys(productCounts).map(p => productColors[p] || '#6b7280'),
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    cutout: '60%',
                    plugins: {
                        legend: { 
                            position: 'bottom',
                            labels: { color: '#a0a0a0', font: { family: 'Outfit', size: 11 }, padding: 10 }
                        }
                    }
                }
            });
        }

        function renderAlerts(alerts) {
            const container = document.getElementById('alertsContainer');
            const recent = alerts.slice(-5);
            
            container.innerHTML = recent.map(a => {
                const time = new Date(a.timestamp).toLocaleTimeString();
                return `
                    <div class="alert-box">
                        <div class="alert-header">
                            <span class="alert-title">System Alert</span>
                            <span class="alert-time">${time}</span>
                        </div>
                        <div class="alert-message">${a.message}</div>
                    </div>
                `;
            }).join('');
        }

        async function deleteVouch(vouchId) {
            if (!confirm('Delete this vouch?')) return;
            
            try {
                await fetch(`${API}/api/admin/vouch/${vouchId}`, {
                    method: 'DELETE',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASSWORD })
                });
                loadData();
            } catch (e) {
                console.error('Error deleting vouch:', e);
            }
        }

        async function resetStaff(staffId) {
            if (!confirm(`Reset all earnings for ${staffId}?`)) return;
            
            try {
                await fetch(`${API}/api/admin/reset/${staffId}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASSWORD })
                });
                loadData();
            } catch (e) {
                console.error('Error resetting staff:', e);
            }
        }

        async function resetAll() {
            if (!confirm('Reset ALL staff earnings and vouches? This cannot be undone!')) return;
            if (!confirm('Are you absolutely sure?')) return;
            
            try {
                await fetch(`${API}/api/admin/reset/all`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: ADMIN_PASSWORD })
                });
                loadData();
            } catch (e) {
                console.error('Error resetting all:', e);
            }
        }

        function logout() {
            sessionStorage.clear();
            authenticated = false;
            window.location.href = '/';
        }

        // Auto refresh
        setInterval(loadData, 30000);
    </script>
</body>
</html>
